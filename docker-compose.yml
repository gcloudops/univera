version: '3.9'

services:

  # ── 1. FRONTEND (Website) ──────────────────
  # Nginx web server will serve React/HTML 
  frontend:
    image: nginx:alpine
    container_name: univera_frontend
    ports:
      - "80:80"          #  website on localhost:80 port 80
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - univera_net

  # ── 2. BACKEND (API) ───────────────────────
  # Node.js Express API
  backend:
    build: ./backend       # Dockerfile will create image
    container_name: univera_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    volumes:
      - uploads_data:/app/uploads    # student documents
      - backend_logs:/app/logs       # application logs
    depends_on:
      postgres:
        condition: service_healthy   # DB ready then it will start
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - univera_net

  # ── 3. DATABASE (PostgreSQL) ───────────────
  # All data is here like — students, payments, HR
  postgres:
    image: postgres:16-alpine
    container_name: univera_postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data   # ★ PERMANENT
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - univera_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 4. CACHE (Redis) ───────────────────────
  # Login sessions, rate limiting
  redis:
    image: redis:7-alpine
    container_name: univera_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data                         # ★ PERMANENT
    restart: unless-stopped
    networks:
      - univera_net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 5. METRICS (Prometheus) ────────────────
  # Backend, DB, Server collect metrics 
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: univera_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus              # ★ 30 days history
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - univera_net

  # ── 6. DASHBOARD (Grafana) ─────────────────
  # Prometheus data visualize  — graphs, dashboards
  grafana:
    image: grafana/grafana:10.2.0
    container_name: univera_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana            # ★ dashboards save
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - univera_net

  # ── 7. ALERTS (Alertmanager) ───────────────
  # Prometheus alert came → Slack message 
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: univera_alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - univera_net

# ══ VOLUMES — Container deleted data will be safe ══
volumes:
  postgres_data:
    name: univera_postgres_data    # DB data
  redis_data:
    name: univera_redis_data       # Sessions
  uploads_data:
    name: univera_uploads_data     # Student files
  backend_logs:
    name: univera_backend_logs     # App logs
  prometheus_data:
    name: univera_prometheus_data  # Metrics
  grafana_data:
    name: univera_grafana_data     # Dashboards
  alertmanager_data:
    name: univera_alertmanager_data

# ══ NETWORKS — Containers communicate with each other ══
networks:
  univera_net:
    driver: bridge
    name: univera_network