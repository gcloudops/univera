apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: univera
  labels:
    app: backend
spec:
  replicas: 2                    # 2 copies = High Availability
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate          # Zero downtime update
    rollingUpdate:
      maxSurge: 1                # Update करताना 1 extra pod
      maxUnavailable: 0          # कोणताही pod down नाही
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: univera/backend:latest
          imagePullPolicy: Never # Local image वापर
          ports:
            - containerPort: 5000
          env:
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: RAZORPAY_KEY_SECRET
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: "postgres"   # K8s DNS - postgres service
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: univera
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP